<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1b0b0b" />
      <stop offset="50%" stop-color="#2a0f0f" />
      <stop offset="100%" stop-color="#17060a" />
    </linearGradient>
    <radialGradient id="g2" cx="30%" cy="20%">
      <stop offset="0%" stop-color="#ff6f3c" stop-opacity="0.12" />
      <stop offset="60%" stop-color="#3b0f0f" stop-opacity="0.0" />
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)"/>
  <rect width="100%" height="100%" fill="url(#g2)"/>
